name: Sync Resume

on:
  push:
    branches: [main]

jobs:
  sync-resume:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-fonts-recommended

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync resume to content.json and compile PDF
        run: node scripts/sync-resume.js --pdf

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content.json public/assets/Sahir_Hameed_Resume.pdf
          git diff --staged --quiet || git commit -m "chore: sync resume to site [skip ci]"
          git push
